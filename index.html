<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0d10" />
    <title>AlperWhisper</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <h1>AlperWhisper</h1>
        <p class="subtitle">Transcrição local no seu navegador.</p>
      </header>

      <section class="mic-section">
        <div id="install-view" class="install-view hidden">
          <button id="install-button" class="install-button" type="button">
            <i data-lucide="download" class="icon-download"></i>
            <span>Iniciar configuração</span>
          </button>
          <p class="install-info">
            Baixa o modelo Whisper Large v3 Turbo (~1.5 GB) uma vez só. Depois
            roda offline, sem API e sem custo.
          </p>
        </div>

        <div id="mic-view" class="mic-view hidden">
          <div class="controls">
            <label class="control">
              <span class="control-label">Idioma</span>
              <select id="language" class="select">
                <option value="">Auto</option>
                <option value="pt" selected>Português</option>
                <option value="en">English</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="it">Italiano</option>
                <option value="ja">日本語</option>
              </select>
            </label>
          </div>
          <button id="mic-button" class="mic-button" type="button" aria-label="Gravar">
            <i data-lucide="mic" class="icon-mic"></i>
            <i data-lucide="square" class="icon-stop"></i>
          </button>
          <p id="status" class="status">Pronto para gravar</p>
          <button id="reinstall-link" class="text-link" type="button">
            Reinstalar modelo
          </button>
        </div>

        <div id="loading" class="loading hidden">
          <div class="loading-bar"><div id="loading-fill" class="loading-fill"></div></div>
          <span id="loading-label" class="loading-label">Carregando modelo…</span>
        </div>
      </section>

      <section id="results" class="results"></section>

      <footer class="footer">
        <p>
          Criado por Guilherme Almeida ·
          <a href="mailto:guilherme.almeida.eng@gmail.com"
            >guilherme.almeida.eng@gmail.com</a
          >
        </p>
      </footer>
    </main>

    <template id="card-template">
      <article class="card">
        <header class="card-head">
          <time class="card-time"></time>
          <button class="copy-btn" type="button" aria-label="Copiar">
            <i data-lucide="copy" class="icon-copy"></i>
            <i data-lucide="check" class="icon-check"></i>
          </button>
        </header>
        <p class="card-text"></p>
      </article>
    </template>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
